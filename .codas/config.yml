version: 1
mode: bootstrap

project:
  name: Codas
  expansion: Code Atlas System
  purpose: Agent-agnostic codebase governance for repositories maintained by coding agents.

workspace:
  roots:
    - .

constraint_sources:
  authoritative:
    - docs/codas-design.html
    - docs/codas-implementation-plan.html
    - docs/codas-structure-map-schema.html
    - .codas/config.yml
    - .codas/policies.yml
    - .codas/structure.yml
    - .codas/program.yml
    - .codas/documents.yml
    - .codas/claims.yml
    - .codas/waivers.yml
    - CONTEXT.md
    - .trellis/workflow.md
    - .trellis/config.yaml
    - .trellis/spec/**/*.md
    - .trellis/tasks/**/*.md
    - .trellis/tasks/**/task.json
  supporting:
    - README.md
    - CONTRACT.md
    - pyproject.toml
    - .codas/wiki/index.md
    - AGENTS.md
    - tests/**/*.py
    - src/**/*.py
    - scripts/*

anchors:
  live_documents:
    - docs/codas-design.html
    - docs/codas-implementation-plan.html
    - .trellis/tasks/*/prd.md

workflow:
  adapter: trellis
  root: .trellis
  task_system: true
  current_task_file: .trellis/.current-task
  task_globs:
    - .trellis/tasks/*/task.json
    - .trellis/tasks/*/prd.md
    - .trellis/tasks/*/implement.jsonl
    - .trellis/tasks/*/check.jsonl
    - .trellis/tasks/archive/**/*/task.json
    - .trellis/tasks/archive/**/*/prd.md
    - .trellis/tasks/archive/**/*/implement.jsonl
    - .trellis/tasks/archive/**/*/check.jsonl

dogfooding:
  enabled: true
  protocol: docs/codas-design.html#dogfooding-protocol
  bootstrap_gate:
    - PYTHONPATH=src python3 -m unittest discover -s tests
    - git status --short

wiki:
  enabled: true
  path: .codas/wiki
  require_evidence: true
  product_roots:
    - src/codas
  # Repo-relative root of the Codas-rendered human book. Reserved from EVERY scan and
  # resolved ABSENT by every claim/role existence site, so the committed-but-derived book
  # never feeds the inventory hash it pins. Default ("wiki"); set "" to opt out (govern a
  # real wiki/ docs dir normally). See structure/index.derived_output_prefixes.
  book_root: wiki

receipts:
  path: .codas/receipts
  required_when_ci_exists: true
