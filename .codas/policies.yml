version: 1
mode: bootstrap

# `severity` is the declared/nominal severity of a policy, NOT the runtime source --
# each check emits its own (sometimes dynamic) severity; bootstrap loader checks
# (`kind: bootstrap`) may emit lower-severity findings than declared here.
# `kind: bootstrap` marks meta/loader checks (config/structure/program/document/waiver
# loading) as distinct from governance rules. `status: planned` marks a policy that is
# declared on the roadmap but not yet implemented. The `policy_registry` policy keeps
# this file and the implemented `check_*` functions in agreement.
policies:
  policy_registry:
    severity: error
    description: Every implemented check_<id> policy under src/codas/policies must be declared here (governance or bootstrap), and every declared non-planned policy must be implemented; otherwise the declared registry has drifted from the code.

  duplicate_concept:
    severity: error
    status: planned
    description: Do not introduce a second implementation for the same concept without a waiver.

  duplicate_symbol:
    severity: warning
    description: Public top-level type or function names repeated across src modules are surfaced as candidate duplicates (detection signal). Enforcement is duplicate_implementation.

  duplicate_implementation:
    severity: error
    description: A top-level symbol implemented in two or more src modules must declare a canonical, variant or migration relationship (with the covered modules) in .codas/claims.yml; otherwise it is flagged as an undeclared duplicate implementation. Concept-level semantic detection is later.

  orphan_artifact:
    severity: error
    status: planned
    description: New files must have an owner, purpose and path into the product architecture.

  stale_claim:
    severity: warning
    description: Markdown link references must point to existing paths; code-span and fragment-anchor checks are later expansion.

  stale_html_claim:
    severity: warning
    description: Path/link references in config-declared authoritative or supporting .html docs must point to existing paths (Layer 1, parity with stale_claim for .md). <code>-span and <a href> paths passing the slash+ext path-shape gate are checked; <pre> example blocks are excluded; code-identifier mention staleness is Layer 2 (deferred). Disjoint fact stream from stale_claim, so no double-reporting.

  stale_wiki_claim:
    severity: warning
    description: Atlas Wiki claims must be verified against repo facts -- a literal canonical-source claim must be a constraint source config declares authoritative or supporting (glob-aware; glob canonical sources are existence-verified only), and canonical_source/evidence/sync_target code-span paths must exist. Broken concept-page links stay with stale_claim; sync_target reverse-pointer consistency is later.

  fact_coupling:
    severity: error
    description: Fact-level co-change couplings (.codas/claims.yml fact_couplings) gate the working-tree-vs-HEAD fact delta -- when a watched symbol/import/call add/remove appears, the required companion path must co-change in the same diff. Always-true by construction (a comment fix produces no fact delta); a malformed coupling is an error, not a silent skip. Supersedes the v1 spec_drift/drift_couplings file-level gate. The coarse Structure Map must_update_if_changed hints stay advisory.

  generated_wiki_drift:
    severity: error
    description: A committed generated Atlas page (.codas/wiki/generated/**) must embed a nonempty atlas:claims block with a source_inventory_hash, and each unit/roadmap claim must match the Structure Map / Program Plan facts; a claim the facts contradict is an error. Source-hash freshness is verified by codas wiki --verify, not the check gate.

  missing_canonical_owner:
    severity: error
    status: planned
    description: New concepts must declare their owner before becoming part of the implementation.

  missing_structure_owner:
    severity: error
    description: Changed artifacts in governed paths must map to a Structure Map unit with an owner.

  structure_drift:
    severity: error
    description: Repository changes must stay aligned with the Structure Map or update it explicitly.

  deprecated_path_used:
    severity: error
    description: New artifacts must not be added under deprecated or removed paths in the Structure Map.

  dependency_direction:
    severity: error
    description: A module must not import a Structure Map unit declared in its owning unit's must_not_depend_on (e.g. codas-policies must not import codas-adapters); evidence is the offending Python import.

  constraint_conflict:
    severity: error
    status: planned
    description: Conflicting authoritative claims must be resolved or explicitly waived.

  stale_preflight:
    severity: warning
    status: planned
    description: During bootstrap, agents must state the affected concept and read canonical sources before editing.

  # Bootstrap meta/loader checks: wired in check.py, emit their own (sometimes
  # dynamic) severity. Declared so the policy_registry stays consistent.
  config_sources:
    severity: error
    kind: bootstrap
    description: Declared authoritative/supporting constraint sources in config.yml must exist on disk.

  structure_map:
    severity: error
    kind: bootstrap
    description: .codas/structure.yml must load as a valid Structure Map (schema/parse check).

  program_plan:
    severity: error
    kind: bootstrap
    description: .codas/program.yml must load as a valid Program Plan (schema/parse check).

  document_set:
    severity: error
    kind: bootstrap
    description: The Project Document Set (documents.yml) canonical-required roles must be present, exist and not out-rank config authority.

  trellis_context:
    severity: error
    kind: bootstrap
    description: The configured Trellis workflow context (root, task globs) must be present and well-formed.

  dogfooding_protocol:
    severity: error
    kind: bootstrap
    description: The repository must satisfy its own declared dogfooding protocol (the dogfooding gate source must exist).

  waivers:
    severity: error
    kind: bootstrap
    description: Each waiver in waivers.yml must declare reason, owner, scope and expiry (waiver schema validation).
