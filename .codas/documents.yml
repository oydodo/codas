version: 1
kind: document_role_manifest

metadata:
  project: Codas
  owner: Document Steward
  updated: "2026-06-18"
  summary: Document Role Manifest binding the Codas Project Document Set to concrete files, authority, owners and update triggers.

defaults:
  authority: authoritative

required_roles:
  - product_design
  - implementation_plan
  - structure_map_schema
  - structure_map
  - program_plan
  - policy_set
  - config
  - waivers
  - domain_context
  - workflow

documents:
  product_design:
    path: docs/codas-design.html
    authority: authoritative
    owner: Codas Core
    updates_when:
      - product_scope_changes
      - architecture_changes

  implementation_plan:
    path: docs/codas-implementation-plan.html
    authority: authoritative
    owner: Document Steward
    updates_when:
      - module_boundaries_change
      - phase_order_changes
      - policy_roadmap_changes

  structure_map_schema:
    path: docs/codas-structure-map-schema.html
    authority: authoritative
    owner: Structure Architect
    updates_when:
      - structure_map_fields_change
      - validation_behavior_changes

  structure_map:
    path: .codas/structure.yml
    authority: authoritative
    owner: Structure Steward
    updates_when:
      - units_change
      - ownership_changes
      - deprecated_paths_change

  program_plan:
    path: .codas/program.yml
    authority: authoritative
    owner: Document Steward
    updates_when:
      - phase_status_changes
      - work_item_added
      - dependencies_change

  policy_set:
    path: .codas/policies.yml
    authority: authoritative
    owner: Policy Maintainer
    updates_when:
      - policy_added
      - severity_changes

  config:
    path: .codas/config.yml
    authority: authoritative
    owner: Policy Maintainer
    updates_when:
      - sources_change
      - workflow_adapter_changes

  waivers:
    path: .codas/waivers.yml
    authority: authoritative
    owner: Policy Maintainer
    updates_when:
      - waiver_added
      - waiver_expires

  claim_set:
    path: .codas/claims.yml
    authority: authoritative
    owner: Policy Maintainer
    updates_when:
      - relationship_claim_added
      - duplicate_resolved

  domain_context:
    path: CONTEXT.md
    authority: authoritative
    owner: Document Steward
    updates_when:
      - terminology_changes
      - new_concept_defined

  workflow:
    path: .trellis/workflow.md
    authority: authoritative
    owner: Task Steward
    updates_when:
      - workflow_phases_change

  task_system_config:
    path: .trellis/config.yaml
    authority: authoritative
    owner: Task Steward
    updates_when:
      - packages_change
      - hooks_change

  orientation_index:
    path: .codas/wiki/index.md
    authority: supporting
    owner: Orientation Curator
    updates_when:
      - concept_added
      - canonical_source_changes

  readme:
    path: README.md
    authority: supporting
    owner: Codas Core
    updates_when:
      - usage_changes
      - commands_change

  agent_instructions:
    path: AGENTS.md
    authority: supporting
    owner: Task Steward
    updates_when:
      - trellis_update
