version: 1
kind: program_plan

metadata:
  project: Codas
  source: docs/codas-implementation-plan.html
  schema: docs/codas-implementation-plan.html#program-plan-work-item
  updated: "2026-06-19"
  authority: authoritative
  owner: Document Steward
  summary: Repo-local Program Plan for Codas. Project-level roadmap above individual Trellis tasks; phases, deliverables and exit criteria are authored claims derived from docs/codas-implementation-plan.html sections 8 and 6. Trellis governs task-level execution; this file governs project-level sequencing.

defaults:
  status: planned

work_items:
  - id: program:P0:cli-core
    phase: P0
    title: CLI core and self-check
    theme: CLI core and self-check
    status: completed
    depends_on: []
    trellis_tasks:
      - 06-17-p0-codas-cli-core-self-check
    deliverables:
      - codas package and CLI command dispatch
      - Config loader for .codas/config.yml, policies.yml and waivers.yml
      - Core domain models (Finding, Evidence, CheckReport)
      - Bootstrap self-check (config-source presence, dogfooding gate, Trellis context, waiver validation)
      - Legacy prototype removal (src/harness_guard, scripts/harness-guard)
    exit_criteria:
      - codas check . reads .codas/config.yml and detects stale authoritative paths

  - id: program:P1:structure-map-foundation
    phase: P1
    title: Inventory, Structure Map and document governance foundation
    theme: Inventory, Structure Map and document governance foundation
    status: completed
    depends_on:
      - program:P0:cli-core
    trellis_tasks:
      - 06-17-design-codas-structure-map-schema
      - 06-17-program-plan-artifact
      - 06-18-structure-map-foundation
      - 06-18-document-role-manifest
      - 06-18-p1-facts-and-realign
    deliverables:
      - Artifact index
      - Doc claim index
      - Trellis task facts
      - Structure Map loader
      - Document Role Manifest loader
      - Program Plan loader
      - JSON inventory
    exit_criteria:
      - codas inventory . emits deterministic Atlas JSON and structure/planning facts for this repo

  - id: program:P2:policy-engine-structure-drift
    phase: P2
    title: Policy engine and structure drift
    theme: Policy engine and structure drift
    status: completed
    depends_on:
      - program:P1:structure-map-foundation
    trellis_tasks:
      - 06-18-stale-claim-and-deprecated-path
      - 06-18-missing-structure-owner
      - 06-18-structure-drift-boundary
      - 06-18-python-symbol-adapter
      - 06-18-duplicate-symbol
      - 06-18-duplicate-implementation-claims
    deliverables:
      - Stale claim policy
      - Orphan artifact policy
      - Duplicate implementation policy
      - Missing owner policy
      - Structure drift policy
      - Waiver validation policy
      - Trellis context policy
    exit_criteria:
      - Known review findings are either fixed or reproduced as Codas findings with evidence

  - id: program:P3:adapter-extraction
    phase: P3
    title: Adapter extraction
    theme: Adapter extraction
    status: completed
    depends_on:
      - program:P2:policy-engine-structure-drift
    trellis_tasks:
      - 06-18-fact-provider-scan-context
      - 06-18-symbol-policies-scan-context
      - 06-18-python-import-facts
      - 06-18-dependency-direction-policy
      - 06-18-harden-dependency-direction
    deliverables:
      - Ecosystem extractors isolated behind adapters; core/policies consume normalized facts via a ScanContext fact-provider (this repo is pure Python, so the §8 Swift/XcodeGen example is realized as the §11 boundary in spirit)
      - Core no longer imports ecosystem concepts (no codas.policies module imports codas.adapters)
      - Dependency-direction policy enforces the adapter boundary as an evidence-backed finding over Python import facts
    exit_criteria:
      - Core/policy tests run without ecosystem assumptions; the adapter boundary is dogfood-enforced (codas check . = 0)

  - id: program:P4:preflight-receipts
    phase: P4
    title: Preflight and receipts
    theme: Preflight and receipts
    status: completed
    depends_on:
      - program:P3:adapter-extraction
    trellis_tasks:
      - 06-18-provenance-hashes
      - 06-18-receipt-ledger
      - 06-19-preflight-context-pack
    deliverables:
      - Inventory hash and policy version provenance (codas check --json provenance block; deterministic content hashes)
      - Receipt ledger (Receipt core model; codas check --receipt writes .codas/receipts/<ts>.json with provenance, findings and result)
      - Task context pack (codas preflight assembles task + read-first sources + active policies + provenance, adapter-free and deterministic)
    exit_criteria:
      - Agent work can prove which task, inventory and check it used (provenance hashes pin inventory+policy; the receipt records them; preflight reports them)

  - id: program:P5:wiki-reconciliation
    phase: P5
    title: Wiki reconciliation
    theme: Wiki reconciliation
    status: completed
    depends_on:
      - program:P4:preflight-receipts
    trellis_tasks:
      - 06-19-wiki-architecture
      - 06-19-wiki-claim-parser
      - 06-19-stale-wiki-claim
      - 06-19-callgraph-facts
      - 06-19-spec-drift
      - 06-19-atlas-pack
      - 06-19-generated-sections
      - 06-19-generated-wiki-drift
      - 06-19-wiki-verify-contract
    deliverables:
      - Wiki claim parser (codas.adapters.wiki -> wiki_claims facts)
      - Stale wiki claim policy (verifies wiki claims authority + evidence vs repo facts)
      - Deterministic call-graph facts (codas.adapters.callgraph -> inventory `calls`; stdlib-ast, first-party, resolution-tagged; enables precise impact, the atlas dependency graph, and the fact-delta substrate; pyan was rejected for cross-process nondeterminism)
      - Spec-drift policy (codas.adapters.git -> ScanContext.changed_paths diff substrate; diff-grounded, materiality-as-claim: coarse must_update_if_changed stays advisory while a vouched .codas/claims.yml coupling gates co-change against the working-tree diff). SUPERSEDED in spec-drift v2 (post-P5) by the fact-delta substrate (codas.facts.snapshot/delta + ScanContext.fact_delta, task 06-20-fact-delta-substrate) and the codas.policies.fact_coupling gate over .codas/claims.yml fact_couplings (task 06-20-fact-coupling-gate); v1 codas.policies.spec_drift + drift_couplings retired. Materiality is a static property of the authored coupling, expressed over fact-deltas (always-true), not a per-change judgment.
      - Atlas grounding pack and deterministic generated sections (dependency graph, symbol index, structure units, roadmap; projected from inventory, byte-identical, no LLM). D3a shipped the grounding pack (codas wiki --emit-pack; pure projection + source_inventory_hash audit receipt, generated-excluded to avoid the self-reference loop). D3b shipped the committed generated governance page (codas wiki --write -> .codas/wiki/generated/governance.md; structure-units + roadmap panels + a fenced atlas:claims block carrying unit/roadmap claims; idempotent, dogfood-clean). Freshness verification of the committed page is D3d (generated_wiki_drift) + the codas wiki --verify byte-compare.
      - Generated-wiki drift verification policy (generated_wiki_drift, shipped D3d): parses each committed generated page's fenced atlas:claims block (a dedicated parser, since extract_wiki_claims skips fences) and verifies unit/roadmap claims against Structure Map + Program Plan facts -- a contradiction or an ungrounded page (no nonempty atlas:claims block with at least one claim) is an error. Freshness is verified by codas wiki --verify (re-render + byte-compare), not the check gate -- the always-on gate cannot re-render without a second inventory scan, so the page carries no embedded freshness hash.
      - codas wiki command (shipped D3a/D3b/D3c): --emit-pack (grounding pack to stdout), --write (render committed generated sections), --verify (byte-compare committed pages to a fresh render; exit 1 if stale -- the CI/opt-in freshness gate, kept out of the always-on check). The committed page carries no embedded freshness hash -- its rendered claim/table lines move exactly when their source facts move, so the --verify byte-compare is the freshness signal. The emit-only pack/tree keep a whole-inventory source_inventory_hash as an audit receipt.
      - Wiki contract / schema layer (shipped D3e): CONTRACT.md (repo root) is the host-agent authoring protocol -- governed (generated sections + atlas:claims, verified) vs supporting (prose, non-authoritative), the atlas:claims grammar, and the emit-pack/write/verify workflow; registered as a config-supporting source + documents.yml role, with pointers from AGENTS.md (after TRELLIS:END) and the wiki index.
    exit_criteria:
      - Wiki claims are verified against repo facts
      - Generated wiki output is grounded in and verified against repo facts; the correctness core (check/inventory/policies) stays deterministic and LLM-free (architecture: 06-19-wiki-architecture decision record)

  - id: program:P6:enforcement-integrations
    phase: P6
    title: Enforcement integrations
    theme: Enforcement integrations
    status: completed
    depends_on:
      - program:P5:wiki-reconciliation
    trellis_tasks:
      - 06-20-codas-doctor
      - 06-20-enforcement-gates
      - 06-20-codas-init
    deliverables:
      - "Installation diagnostics (S1): codas doctor [--json] -- read-only health check (config/policies/waivers/structure load, config-declared optional sources, Trellis tasks root, git work tree, removed-prototype leftovers); exits 1 on any fail. Distinct from check's governance policies."
      - "Enforcement gates (S2): committed GitHub Action .github/workflows/codas.yml runs the bootstrap tests + codas check on push/PR (blocks a bad PR); codas hooks --install writes pre-commit/pre-push hooks that run codas check (blocks a bad commit) -- honors core.hooksPath, preserves foreign hooks, --command overrides the runner. Backed by src/codas/integrations (role-integrations unit, now active); enforcement.py shells out to codas check (never imports the core, §11), routed via app/hooks.py so the CLI does not cross the codas-source -> role-integrations boundary."
      - "Scaffold (S3): codas init [--force] scaffolds a minimal valid .codas/ skeleton (config/policies/structure/waivers) -- the inverse of doctor; no-clobber + symlink-safe."
      - "Trellis hooks: Trellis lifecycle hooks are non-blocking by design (warn, never block), so the blocking enforcement is the git hooks + GitHub Action above; a documented opt-in recipe for wiring codas preflight/check into .trellis/config.yaml hooks is provided (commented) rather than self-activated."
    exit_criteria:
      - Codas can block a bad PR or commit with evidence-backed findings (GitHub Action gates the PR; the installed pre-commit/pre-push hooks gate the commit/push)

  - id: program:P7:agent-query-interface
    phase: P7
    title: Agent query interface
    theme: Agent query interface
    status: planned
    depends_on:
      - program:P6:enforcement-integrations
    trellis_tasks:
      - 06-20-codas-impact
      - 06-20-codas-query-and-schema-p7-query-surface
    deliverables:
      - "CLI-first query interface (decision 2026-06-20: CLI + deterministic JSON is the agent-query contract; MCP is OPTIONAL sugar). Codas already emits deterministic JSON (codas check/inventory/preflight --json, receipts); agents query by shelling out + jq. A thin set of query subcommands makes jq optional: codas impact <symbol|path> (reverse reachability over the calls call-graph facts -- 'changing this affects whom', shipped 06-20-codas-impact), codas query <kind> --select FIELD=VALUE (pre-shaped inventory slices) and codas schema (the JSON row shape, derived from the live inventory) -- both shipped 06-20-codas-query-and-schema-p7-query-surface."
      - "MCP server -- OPTIONAL thin stateless role-integration shell over the same core (shells out / read-only-calls, never re-implements fact logic, like enforcement.py shells out to codas check), built only if a target runtime needs typed self-describing tools. Not required: a stateful daemon + non-deterministic surface fights Codas's deterministic/stateless/auditable identity, and the CLI JSON is already the real interface."
      - Role Integrations for Codex, Claude Code, hooks, CI and human review (platform mappings over the CLI query surface)
      - OSS LLM-wiki backend adapters (push verified grounding into deepwiki/CodeWiki-style generators; file-convention and subprocess injection, NOT MCP, per the 06-19-wiki-architecture decision)
    exit_criteria:
      - Codex, Claude and Cursor can query Codas without parsing reports manually (via the CLI query subcommands + deterministic JSON; MCP optional)
      - An external LLM-wiki generator can be grounded by Codas and its output verified against repo facts

  - id: program:P8:readable-wiki-book
    phase: P8
    title: Readable wiki book + wiki-layer convergence
    theme: Readable wiki book + wiki-layer convergence
    status: planned
    depends_on:
      - program:P7:agent-query-interface
    trellis_tasks:
      - 06-21-wiki-layer-plan
      - 06-21-w4a-wiki-book-skeleton
      - 06-21-w4b-wiki-book-chapters
      - 06-21-w5-unify-code-wiki
      - 06-21-w6-prose-weave
      - 06-21-product-scope-config
      - 06-21-w7-register-existence-fix
    deliverables:
      - "TWO-PART SPLIT (decision 2026-06-21, brainstorm wlf4jvc99 + grill-me): .codas/wiki/ = the MACHINE/SOURCE layer (verified claims + advisory why-prose, agent + check facing); wiki/ (repo root) = the HUMAN BOOK (the persistent readable knowledge base). Dissolves the dual-audience conflation -- agents consume the FEED + claims, humans read wiki/."
      - "Canonical model: wiki artifacts classify by VERIFICATION CONTRACT -- FEED (ephemeral stdout projection), GENERATED (committed deterministic, hash-excluded, --verify), WIKI-PAGES (committed advisory prose out-of-hash + verified claim block: structural + reference kinds), CACHE (gitignored author scratchpad)."
      - "W4: codas wiki --write RENDERS the wiki/ chapter-book SKELETON deterministically -- nav/index + overview + ~24 per-subsystem chapters (module->class->function tree-slice + dependency mermaid + owner + one open-world lower-bound banner), with the advisory why-prose woven in from .codas/wiki/ source. wiki/ is hash-EXCLUDED (a derived render) and --verify-checked; skeleton-first, prose filled incrementally. W4a DONE (06-21-w4a-wiki-book-skeleton): scanner-level wiki/ exclusion in filter_to_roots (the funnel for discover_files + head_snapshot + artifact index) + wiki/index.md + the codas-app chapter + --verify byte-compare + orphan-page detection; app/book.py renderer, app/render_util.py leaf. W4b DONE (06-21-w4b-wiki-book-chapters): chapter set is now DERIVED (every unit owning >=1 product tree node) -> 10 code chapters auto-render + index links them; non-code units stay index entries. W4 (skeleton) COMPLETE; prose (the why woven in) is W6."
      - "W5 DONE (06-21-w5-unify-code-wiki): UNIFIED code_anchor + semantic_wiki into ONE parser/policy/grammar. code_anchor survives (name kept) with the full defines/calls/contains grammar reading .codas/wiki/code/**; semantic_wiki policy + the anchor_symbol machinery (extract_code_anchor_claims/CodeAnchorClaim/_parse_anchor_symbol/SEMANTIC_WIKI_ROOT) deleted; offline W3 cache (semantic_corpus_claims/calibrate) untouched; code/openworld.md migrated to defines:; CONTRACT.md updated. Byte-identical (code/ prose out-of-hash, proven in isolation); 480 tests; check 0; codex DESIGN+IMPL reviewed."
      - "W6 DONE (06-21-w6-prose-weave): codas wiki --write now WEAVES host-authored why-prose from .codas/wiki/code/<unit>.md into each chapter as ## Overview (skeleton-first: absent prose -> structure-only; claims fence stripped). Mechanism in book.py (_strip_claims_block/_read_chapter_prose, project_book(prose_by_unit)); prose is out-of-hash + LLM-authored offline, the RENDER is deterministic (§17). Authored all 10 code-unit pages via a parallel fan-out grounded in source; 29 defines-anchors all resolve (code_anchor verifies, 0 warnings). Book now reads as narrative + structure. codex IMPL no-blocker (fence-closer tightened in book.py + semantic.py; prose-lint NIT declined). Incremental: concept pages + remaining prose fill over time."
      - "W7 DONE (06-21-w7-register-existence-fix): config-drove the derived-output reservation + CLOSED the latent claim-existence leak. New wiki.book_root config knob (default 'wiki'; '' opts out so a user's real wiki/ docs stay governed -- no over-reach) resolved by structure/index.derived_output_prefixes; one public is_derived_output(path, prefixes) predicate threaded as DATA through the scanner (filter_to_roots/_walk_files/discover_files/build_artifact_index) AND head_snapshot AND all SIX existence sites that serialized a claim/role target's existence into the byte-identical inventory: markdown doc_claims + _resolve code-span disambiguation (5th site), html_claims, wiki _exists, documents-role, and the build_artifact_index literal-unit observed.exists (6th, preemptive). A derived-output target now resolves exists=False WITHOUT Path.exists, so a governance doc that links the rendered book never bleeds the book's on-disk presence into the hash (proven: an on-disk book file referenced by a doc resolves exists=False; with-vs-without-book inventory byte-identical in tests/test_book.py::BookReferenceLeakClosedTests). Adapters receive prefixes as data from facts/context.ScanContext._derived_prefixes (import is_derived_output from structure.index = W5 precedent; never import config, §11). Registration = the config knob (book is a derived output, NOT a documents.yml role -- a role would re-open a 7th existence site + document_set would demand a scanner-excluded file). CONTRACT.md: amended the renders sentence (Codas renders the book deterministically; an LLM only authors advisory source prose; Codas verifies + byte-compares) + added the Verification-contract section (4 artifact classes + verifier-routing table: doc->stale_claim, html->stale_html_claim, wiki->stale_wiki_claim, generated->generated_wiki_drift, code-wiki->code_anchor, book->--verify). Default ('wiki',) kept (codex DESIGN: flipping to () broke 3 config-less test_artifact_index tests); test_adapters wiki/ fixture moved to docs/. 500 tests; check 0; inventory byte-identical 2x; wiki --verify clean. codex DESIGN review folded (design.md §5b); codex IMPL reviewed."
      - "W8: packaging -- pip/pipx install + a README quickstart that does not teach PYTHONPATH (a real doc-lie fix). Parallel, pure moat-alignment, no wiki risk."
      - "CROSS-REPO ENABLER DONE (06-21-product-scope-config): config-drove the product scope -- removed the hardcoded _PRODUCT_PREFIX='src/codas/' (app/wiki.py) -> wiki.product_roots config knob (default ('src',), one _under_any predicate, threaded as data through project_atlas_pack/tree + project_book; builders read config). Codas config sets ['src/codas'] so its own pack/tree/book stay byte-identical. The wiki outputs now cover ANY repo's layout (a lib/-layout repo renders a non-empty tree; proven in test_product_scope.py). codex IMPL LGTM. Remaining cross-repo blockers: W7 (book existence) + W8 (packaging) + per-repo scaffolding maturity; _POLICY_PREFIX (policy_registry, Codas-self dogfood) intentionally left."
      - "DEFERRED (placed, not commitments): S2 multi-language extraction (moat-gated, may never ship); Block B FSoft CodeWiki shell-out (license-gated); --scope feed slicing (until a real run shows hand-slicing friction); W3 judge productization (after the book/loop has real use); --promote cache->committed (manual git mv until a real page demands a command)."
    exit_criteria:
      - A human can browse a generated wiki/ chapter book (codas wiki --write) from index -> subsystem -> symbol; codas check 0 + --verify clean + byte-identical preserved (wiki/ hash-excluded)
      - One verified-claim parser/policy/grammar for committed wiki pages (code_anchor folded into the unified verifier); pip/pipx install works without PYTHONPATH
