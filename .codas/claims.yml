version: 1
kind: claim_set

metadata:
  project: Codas
  authority: authoritative
  summary: Repo-local relationship claims that govern intentional duplication.

# Declared canonical/variant/migration relationships for symbols that the
# duplicate_implementation policy would otherwise flag. Each entry is a positive
# governance claim (§6), not a waiver: it asserts the duplication is intentional,
# names the responsible owner and reason, and lists the EXACT modules it covers so
# a future copy in a new module is not silently suppressed.
duplicate_relationships:
  - symbol: _rel
    relationship: variant
    owner: Codas Core
    reason: Small private repo-relative path helper intentionally kept local to each module to avoid a shared-utility coupling between app, policies and adapters.
    modules:
      - src/codas/app/check.py
      - src/codas/policies/config_sources.py
      - src/codas/policies/dogfooding.py
      - src/codas/policies/trellis_context.py
      - src/codas/policies/waivers.py

  - symbol: _mapping
    relationship: variant
    owner: Codas Core
    reason: Private "coerce to mapping or empty dict" guard intentionally kept local to the config and structure loaders.
    modules:
      - src/codas/config/loader.py
      - src/codas/structure/document_loader.py
      - src/codas/structure/loader.py
      - src/codas/structure/program_loader.py

  - symbol: _optional_str
    relationship: variant
    owner: Codas Core
    reason: Private "None or str" coercion helper intentionally kept local to the config loader, structure loader and Trellis adapter.
    modules:
      - src/codas/adapters/trellis.py
      - src/codas/config/loader.py
      - src/codas/structure/loader.py

  - symbol: _str_tuple
    relationship: variant
    owner: Codas Core
    reason: Private "list to tuple of str" helper intentionally kept local to the structure, document and program loaders.
    modules:
      - src/codas/structure/document_loader.py
      - src/codas/structure/loader.py
      - src/codas/structure/program_loader.py

# Fact-level co-change couplings for the fact_coupling policy (spec-drift v2 gating
# half; supersedes the retired v1 drift_couplings file-level mechanism). A coupling
# watches a FACT-delta (a symbol/import/call added or removed in the
# working-tree-vs-HEAD diff) and requires a companion path to co-change in the SAME
# diff; if the watched fact-delta is nonempty and a required path is absent, the
# policy errors. The trigger is a fact, not a file, so the coupling is always-true by
# construction — a comment fix or a refactor that adds no symbol/import/call produces
# no delta and the coupling stays dormant (zero materiality judgment, §17-clean).
# The coarse structure.yml `must_update_if_changed` hints stay ADVISORY (they have no
# always-true fact-level form); an entry graduates to a hard coupling here only when a
# specific fact-delta makes the companion obligation always-true.
#
# when_fact.kind: symbol_added|symbol_removed|import_added|import_removed|
#                 call_added|call_removed
# when_fact.scope: repo-rel path prefix the fact's module must be under
# when_fact.name:  optional fnmatch on the fact identity (symbol name / import target /
#                  callee symbol)
# requires:        companion paths/globs (fnmatch) that must appear in the same diff
fact_couplings:
  - when_fact:
      kind: symbol_added
      scope: src/codas/policies
      name: "check_*"
    requires:
      - src/codas/app/check.py
    owner: Codas Core
    reason: >-
      A new check_* policy under src/codas/policies must be wired into run_check in
      src/codas/app/check.py to actually run. policy_registry (state) verifies a
      check_* is declared in policies.yml but NOT that it is dispatched, so an unwired
      new policy passes every state check yet is a silent dead gate. This coupling
      catches that drift: adding a check_* without touching check.py is an error.

  # ANCHOR-TO-SOURCE, enforced (not just remembered). The open-world fact model lives in
  # code at src/codas/facts/openworld.py and is authoritatively summarised in
  # docs/codas-design.html (§9.4). When the model's PUBLIC code API changes, the master
  # design doc must follow IN THE SAME DIFF — otherwise the doc silently falls behind the
  # model (exactly what happened when B2 shipped before §9.4 existed). This is the
  # deterministic slice of anchor-to-source: a public symbol-delta is the always-true
  # fact-level trigger that the coarse advisory must_update_if_changed lacks. The SEMANTIC
  # slice (a pure-PROSE model edit with no symbol-delta) cannot be gated deterministically
  # — it is the LLM semantic-legality layer's job, not this coupling's. name "[!_]*" scopes
  # to PUBLIC symbols so a private helper does not demand a doc change.
  - when_fact:
      kind: symbol_added
      scope: src/codas/facts/openworld.py
      name: "[!_]*"
    requires:
      - docs/codas-design.html
    owner: Codas Core
    reason: >-
      A new public symbol in the open-world fact model (src/codas/facts/openworld.py)
      changes its authoritative contract, so docs/codas-design.html §9.4 must co-change.

  - when_fact:
      kind: symbol_removed
      scope: src/codas/facts/openworld.py
      name: "[!_]*"
    requires:
      - docs/codas-design.html
    owner: Codas Core
    reason: >-
      Removing a public symbol from the open-world fact model
      (src/codas/facts/openworld.py) changes its authoritative contract, so
      docs/codas-design.html §9.4 must co-change.
